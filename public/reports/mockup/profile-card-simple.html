<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로필 카드 — Meta Business Partners</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#fff;color:#1a1a1a;line-height:1.7;padding:40px 20px}
.container{max-width:600px;margin:0 auto}
.card{border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:24px 0}
.top{display:flex;align-items:center;gap:16px}
.photo{width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0}
.name{font-weight:800;font-size:16px;color:#1a1a1a}
.role{font-weight:600;font-size:13px;color:#F75D5D}
.desc{margin:4px 0 0;font-size:13px;color:#64748b;line-height:160%}
.partner{margin-top:14px;padding-top:14px;border-top:1px solid #f1f5f9}
.partner img{height:24px}
</style>
</head>
<body>
<div class="container">
<div class="card">
  <div class="top">
    <img class="photo" src="images/profile-smith.png" alt="스미스">
    <div>
      <div class="name">스미스 <span class="role">자사몰사관학교 코치</span></div>
      <div class="desc">메타파트너 / 메타공식 프로페셔널<br>스킨스쿨 / 재미어트 Co-founder<br>수강생 자사몰매출 450억+</div>
    </div>
  </div>
  <div class="partner">
    <img src="images/inline-positive.png" alt="Meta Business Partners">
  </div>
</div>
</div>
</body>
</html>
